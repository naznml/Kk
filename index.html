<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>
  Қазақ тілін оқыту әдістемесі
</title>

<style>
* {
  box-sizing: border-box;
}

:root {
  --primary: #0f766e;
  --primary-dark: #115e59;
  --primary-light: #ccfbf1;

  --background: #f3f8f7;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #667085;
  --border: #d6e4e1;

  --correct: #15803d;
  --correct-background: #dcfce7;

  --wrong: #b91c1c;
  --wrong-background: #fee2e2;

  --partial: #a16207;
  --partial-background: #fef3c7;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Arial,
    sans-serif;
  background: var(--background);
  color: var(--text);
  line-height: 1.55;
}

header {
  padding: 34px 16px 58px;
  background:
    linear-gradient(
      135deg,
      #0f766e,
      #14b8a6
    );
  color: white;
  text-align: center;
}

header h1 {
  margin: 0 0 10px;
  font-size: 34px;
  line-height: 1.2;
}

header p {
  margin: 0;
  font-size: 17px;
  opacity: 0.95;
}

.container {
  width: min(
    960px,
    calc(100% - 24px)
  );
  margin: -32px auto 55px;
}

.section-header {
  padding: 22px;
  margin-bottom: 15px;
  background: white;
  border-radius: 17px;
  box-shadow:
    0 5px 20px
    rgba(31, 41, 55, 0.08);
}

.section-header h2 {
  margin: 0 0 7px;
  color: var(--primary);
  font-size: 28px;
}

.section-header p {
  margin: 0;
  color: var(--muted);
}

.section-information {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 13px;
}

.information-badge {
  display: inline-flex;
  align-items: center;
  padding: 7px 11px;
  border-radius: 999px;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: 14px;
  font-weight: 800;
}

.progress-card {
  padding: 16px 18px;
  margin-bottom: 15px;
  background: white;
  border-radius: 15px;
  box-shadow:
    0 4px 18px
    rgba(31, 41, 55, 0.07);
}

.progress-information {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 9px;
  color: var(--muted);
}

.progress-information strong {
  color: var(--primary);
}

.progress-line {
  width: 100%;
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #dfe9e7;
}

.progress-line span {
  display: block;
  width: 0;
  height: 100%;
  border-radius: 999px;
  background: var(--primary);
  transition: width 0.25s;
}

.question {
  padding: 21px;
  margin-bottom: 15px;
  background: var(--card);
  border: 1px solid #dce8e5;
  border-radius: 16px;
  box-shadow:
    0 4px 17px
    rgba(31, 41, 55, 0.06);
}

.question-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 38px;
  height: 35px;
  margin-bottom: 12px;
  padding: 0 11px;
  border-radius: 10px;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-weight: 900;
}

.question-title {
  margin: 0 0 16px;
  font-size: 18px;
  line-height: 1.55;
}

.multiple-answer-hint {
  margin: -4px 0 14px;
  padding: 10px 12px;
  border-radius: 10px;
  background: #fef3c7;
  color: #92400e;
  font-size: 14px;
  font-weight: 800;
}

.options {
  display: grid;
  gap: 9px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 13px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: white;
  cursor: pointer;
  transition: 0.18s;
}

.option:hover {
  border-color: #5eead4;
  background: #f8fffd;
}

.option input {
  flex: 0 0 auto;
  margin-top: 4px;
  transform: scale(1.15);
  accent-color: var(--primary);
}

.option-letter {
  flex: 0 0 25px;
  color: #475467;
  font-weight: 900;
}

.option.correct {
  border-color: #22c55e;
  background: var(--correct-background);
  color: #166534;
}

.option.wrong {
  border-color: #ef4444;
  background: var(--wrong-background);
  color: #991b1b;
}

.explanation {
  display: none;
  margin-top: 17px;
  padding-top: 16px;
  border-top: 1px solid #e4e7ec;
}

.question.checked .explanation {
  display: block;
}

.question-score {
  margin-bottom: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  font-weight: 900;
}

.question-score.full {
  background: var(--correct-background);
  color: #166534;
}

.question-score.partial {
  background: var(--partial-background);
  color: var(--partial);
}

.question-score.zero {
  background: var(--wrong-background);
  color: #991b1b;
}

.correct-answer {
  padding: 12px 14px;
  border-radius: 11px;
  background: var(--correct-background);
  color: #166534;
  font-weight: 800;
}

.explanation-title {
  margin: 14px 0 7px;
  color: var(--primary-dark);
  font-size: 17px;
  font-weight: 900;
}

.explanation-text {
  margin: 0;
  padding: 13px 14px;
  border-radius: 11px;
  background: #f6fbfa;
}

.key-fact {
  margin-top: 11px;
  padding: 12px 14px;
  border-left: 5px solid var(--primary);
  border-radius: 8px;
  background: var(--primary-light);
  font-weight: 750;
}

.result-card {
  display: none;
  padding: 24px;
  margin: 18px 0;
  border-radius: 16px;
  background: white;
  text-align: center;
  box-shadow:
    0 4px 18px
    rgba(31, 41, 55, 0.08);
}

.result-card.show {
  display: block;
}

.result-card h3 {
  margin: 0 0 8px;
  color: var(--primary);
}

.score {
  margin: 5px 0;
  color: var(--primary);
  font-size: 39px;
  font-weight: 900;
}

.actions {
  position: sticky;
  bottom: 0;
  z-index: 20;
  display: flex;
  gap: 10px;
  padding: 13px 0 17px;
  background:
    rgba(243, 248, 247, 0.95);
  backdrop-filter: blur(9px);
}

.actions button {
  border: none;
  border-radius: 12px;
  padding: 15px 17px;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
}

.show-result-button {
  flex: 1;
  background: var(--primary);
  color: white;
}

.reset-button {
  background: #e5e7eb;
  color: #1f2937;
}

@media (max-width: 650px) {
  header h1 {
    font-size: 27px;
  }

  .question {
    padding: 17px 15px;
  }

  .question-title {
    font-size: 17px;
  }

  .actions {
    flex-direction: column-reverse;
  }
}
</style>
</head>

<body>

<header>
  <h1>
    Қазақ тілін оқыту әдістемесі
  </h1>

  <p>
    Кешенді тестілеуге дайындық
  </p>
</header>

<main class="container">

    </p>

    <div class="section-information">

        Толық жауап: 2 балл

    </div>

  </section>

  <div class="progress-card">

    <div class="progress-information">

      <span>
        Жауап беру барысы
      </span>

      <strong id="progressText">
        0 / 20
      </strong>

    </div>

    <div class="progress-line">
      <span id="progressBar"></span>
    </div>

  </div>

  <div
    id="resultCard"
    class="result-card"
  >

    <h3>
      Жалпы нәтиже
    </h3>

    <div
      id="totalScore"
      class="score"
    >
      0 / 40
    </div>

  </div>

  <div id="quiz"></div>

  <div class="actions">

    <button
      type="button"
      class="reset-button"
      onclick="resetTest()"
    >
      Қайта бастау
    </button>

    <button
      type="button"
      class="show-result-button"
      onclick="showResults()"
    >
      Нәтижені көрсету
    </button>

  </div>

function getCorrectIndexes(question) {
  if (Array.isArray(question.correct)) {
    return [...question.correct];
  }

  return [question.correct];
}

function getCorrectAnswerText(question) {
  return getCorrectIndexes(question)
    .map(index => {
      return `
        ${letters[index]})
        ${question.options[index]}
      `;
    })
    .join("<br>");
}

function renderQuestion(
  question,
  questionIndex
) {
  const correctIndexes =
    getCorrectIndexes(question);

  const isMultiple =
    correctIndexes.length > 1;

  const inputType =
    isMultiple
      ? "checkbox"
      : "radio";

  const multipleHint =
    isMultiple
      ? `
        <div class="multiple-answer-hint">
       .
          
        </div>
      `
      : "";

  const optionsHtml =
    question.options
      .map((option, optionIndex) => {
        return `
          <label
            class="option"
            data-option-index="${optionIndex}"
          >
            <input
              type="${inputType}"
              name="question${questionIndex}"
              value="${optionIndex}"
            >

            <span class="option-letter">
              ${letters[optionIndex]})
            </span>

            <span>
              ${option}
            </span>
          </label>
        `;
      })
      .join("");

  return `
    <article
      class="question"
      data-question-index="${questionIndex}"
    >
      <div class="question-number">
        ${question.number}-сұрақ
      </div>

      <h3 class="question-title">
        ${question.question}
      </h3>

      ${multipleHint}

      <div class="options">
        ${optionsHtml}
      </div>

      <div class="explanation">

        <div class="question-score"></div>

        <div class="correct-answer">
          Дұрыс жауап:<br>
          ${getCorrectAnswerText(question)}
        </div>

        <div class="explanation-title">
          Түсіндірме
        </div>

        <p class="explanation-text">
          ${question.explanation}
        </p>

        <div class="key-fact">
          ${question.keyFact}
        </div>

      </div>
    </article>
  `;
}

function renderQuestions() {
  const quiz =
    document.getElementById("quiz");

  quiz.innerHTML =
    questions
      .map((question, questionIndex) => {
        return renderQuestion(
          question,
          questionIndex
        );
      })
      .join("");

  quiz
    .querySelectorAll("input")
    .forEach(input => {
      input.addEventListener(
        "change",
        updateProgress
      );
    });
}

function getSelectedIndexes(questionBlock) {
  return Array.from(
    questionBlock.querySelectorAll(
      "input:checked"
    )
  )
    .map(input => {
      return Number(input.value);
    })
    .sort((a, b) => a - b);
}

function arraysAreEqual(
  firstArray,
  secondArray
) {
  if (
    firstArray.length !==
    secondArray.length
  ) {
    return false;
  }

  return firstArray.every(
    (value, index) => {
      return value === secondArray[index];
    }
  );
}

function calculateQuestionScore(
  selectedIndexes,
  correctIndexes
) {
  if (
    arraysAreEqual(
      selectedIndexes,
      correctIndexes
    )
  ) {
    return 2;
  }

  if (selectedIndexes.length === 0) {
    return 0;
  }

  const selectedCorrectCount =
    selectedIndexes.filter(index => {
      return correctIndexes.includes(index);
    }).length;

  const selectedWrongCount =
    selectedIndexes.filter(index => {
      return !correctIndexes.includes(index);
    }).length;

  const missedCorrectCount =
    correctIndexes.filter(index => {
      return !selectedIndexes.includes(index);
    }).length;

  const totalDifferences =
    selectedWrongCount +
    missedCorrectCount;

  if (
    selectedCorrectCount > 0 &&
    totalDifferences === 1
  ) {
    return 1;
  }

  return 0;
}

function markQuestionAnswers(
  questionBlock,
  correctIndexes,
  selectedIndexes
) {
  const optionBlocks =
    questionBlock.querySelectorAll(
      ".option"
    );

  optionBlocks.forEach(
    (optionBlock, optionIndex) => {
      optionBlock.classList.remove(
        "correct",
        "wrong"
      );

      if (
        correctIndexes.includes(
          optionIndex
        )
      ) {
        optionBlock.classList.add(
          "correct"
        );
      }

      if (
        selectedIndexes.includes(
          optionIndex
        ) &&
        !correctIndexes.includes(
          optionIndex
        )
      ) {
        optionBlock.classList.add(
          "wrong"
        );
      }
    }
  );
}

function showQuestionScore(
  questionBlock,
  points
) {
  const scoreElement =
    questionBlock.querySelector(
      ".question-score"
    );

  scoreElement.classList.remove(
    "full",
    "partial",
    "zero"
  );

  scoreElement.textContent =
    `Бұл сұрақ бойынша: ${points} / 2 балл`;

  if (points === 2) {
    scoreElement.classList.add("full");
  } else if (points === 1) {
    scoreElement.classList.add(
      "partial"
    );
  } else {
    scoreElement.classList.add("zero");
  }
}

function updateProgress() {
  const questionBlocks =
    document.querySelectorAll(
      ".question"
    );

  let answeredQuestions = 0;

  questionBlocks.forEach(
    questionBlock => {
      if (
        questionBlock.querySelector(
          "input:checked"
        )
      ) {
        answeredQuestions++;
      }
    }
  );

  document.getElementById(
    "progressText"
  ).textContent =
    `${answeredQuestions} / ${questions.length}`;

  const progressPercent =
    (
      answeredQuestions /
      questions.length
    ) * 100;

  document.getElementById(
    "progressBar"
  ).style.width =
    `${progressPercent}%`;
}

function showResults() {
  const questionBlocks =
    document.querySelectorAll(
      ".question"
    );

  let totalPoints = 0;

  questionBlocks.forEach(
    (questionBlock, questionIndex) => {
      const question =
        questions[questionIndex];

      const selectedIndexes =
        getSelectedIndexes(
          questionBlock
        );

      const correctIndexes =
        getCorrectIndexes(
          question
        ).sort((a, b) => a - b);

      const points =
        calculateQuestionScore(
          selectedIndexes,
          correctIndexes
        );

      totalPoints += points;

      markQuestionAnswers(
        questionBlock,
        correctIndexes,
        selectedIndexes
      );

      showQuestionScore(
        questionBlock,
        points
      );

      questionBlock.classList.add(
        "checked"
      );

      questionBlock
        .querySelectorAll("input")
        .forEach(input => {
          input.disabled = true;
        });
    }
  );

  finalScore = totalPoints;

  document.getElementById(
    "totalScore"
  ).textContent =
    `${finalScore} / 40`;

  const resultCard =
    document.getElementById(
      "resultCard"
    );

  resultCard.classList.add("show");

  resultCard.scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

function resetTest() {
  finalScore = null;

  document
    .querySelectorAll("input")
    .forEach(input => {
      input.checked = false;
      input.disabled = false;
    });

  document
    .querySelectorAll(".option")
    .forEach(option => {
      option.classList.remove(
        "correct",
        "wrong"
      );
    });

  document
    .querySelectorAll(".question")
    .forEach(questionBlock => {
      questionBlock.classList.remove(
        "checked"
      );

      const scoreElement =
        questionBlock.querySelector(
          ".question-score"
        );

      scoreElement.textContent = "";

      scoreElement.classList.remove(
        "full",
        "partial",
        "zero"
      );
    });

  document.getElementById(
    "resultCard"
  ).classList.remove("show");

  document.getElementById(
    "totalScore"
  ).textContent =
    "0 / 40";

  updateProgress();

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

renderQuestions();
updateProgress();
